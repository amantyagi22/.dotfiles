# tmux-sessionizer config

# Directories to fuzzy-search when you hit Ctrl-f (depth via :N suffix)
TS_SEARCH_PATHS=(
    ~/Developer
    ~/Developer/personal
)

# Add more without overriding the defaults
TS_EXTRA_SEARCH_PATHS=(
    ~/.config:2
)

# Default search depth when no :N suffix is given
TS_MAX_DEPTH=2

# Deeper search for monorepos with packages/*
TS_EXTRA_SEARCH_PATHS+=(
    ~/Developer/work/sop-fe/packages:1
)

# Harpoon-style session commands (windows start at index 69)
#   -s 0 -> dev server
#   -s 1 -> mongosh
#   -s 2 -> test watcher
#   -s 3 -> lazygit
TS_SESSION_COMMANDS=(
    "npm run dev"
    "mongosh"
    "npm test -- --watch"
    "lazygit"
)

# Logging (uncomment to enable)
# TS_LOG=file
# TS_LOG_FILE="$HOME/.local/share/tmux-sessionizer/tmux-sessionizer.logs"
